<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>casoCAD</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #0f1216;
    }
    #casowasm_canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="casowasm_canvas"></canvas>
  <script type="module">
    import init from "./pkg/caso_app.js";
    init().catch((error) => {
      console.error("casoWASM failed to start:", error);
    });
  </script>
</body>
</html>
